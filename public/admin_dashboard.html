<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자 대시보드 - 멋쟁이사자처럼</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f6f8; font-family: 'Malgun Gothic', sans-serif; display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 250px; background-color: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px 0; }
    .sidebar-menu { list-style: none; padding: 0; margin: 0; }
    .sidebar-menu li { padding: 15px 30px; font-size: 15px; color: #555; cursor: pointer; font-weight: 500; transition: 0.2s; }
    .sidebar-menu li:hover { background-color: #f8f9fa; color: #FF7710; }
    .sidebar-menu li.active { color: #FF7710; font-weight: bold; border-left: 4px solid #FF7710; }
    .main-content { flex: 1; display: flex; flex-direction: column; padding: 30px 40px; overflow-y: auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .header-title { text-align: center; width: 100%; position: relative; }
    .logo-text { color: #FF7710; font-size: 28px; font-weight: bold; }
    .sub-text { color: #666; font-size: 14px; margin-top: 5px; }
    .admin-info { position: absolute; right: 0; top: 10px; font-size: 14px; color: #666; }
    .logout-btn { background: none; border: none; color: #FF7710; cursor: pointer; font-weight: bold; margin-left: 10px; }
    .control-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .course-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; outline: none; }
    .date-display { font-size: 18px; font-weight: bold; color: #333; }
    .record-btn { background-color: #FF7710; color: white; border: none; padding: 10px 24px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .record-btn:hover { background-color: #e66a00; }
    .record-btn.recording { background-color: #dc3545; }
    .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th, td { padding: 16px; border-bottom: 1px solid #eee; }
    th { background-color: #f8f9fa; color: #555; font-weight: bold; font-size: 14px; }
    td { font-size: 14px; color: #333; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .status-focused { background-color: #28a745; }
    .status-drowsy { background-color: #dc3545; }
    .status-waiting { background-color: #adb5bd; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <ul class="sidebar-menu"><li class="active">수업 모니터링</li><li>월별 조회</li><li>과정별 집중도</li><li>목록 관리</li></ul>
  </aside>

  <main class="main-content">
    <header>
      <div class="header-title">
        <div class="logo-text">멋쟁이사자처럼</div>
        <div class="sub-text">AI NL 5기 과정 - 관리자 페이지</div>
        <div class="admin-info">Admin님 <button class="logout-btn" id="logoutBtn">로그아웃</button></div>
      </div>
    </header>

    <div class="control-bar">
      <select class="course-select" id="courseFilter">
        <option value="AI NL 5기">AI NL 5기</option><option value="AI CV 4기">AI CV 4기</option><option value="프론트엔드 3기">프론트엔드 3기</option>
      </select>
      <div class="date-display" id="currentDate"></div>
      <button class="record-btn" id="recordBtn">기록 시작</button>
    </div>

    <div class="table-container">
      <table>
        <thead><tr><th>상태</th><th>이름</th><th>과정명</th><th>평균 집중도</th><th>이탈 횟수</th><th>접속 여부</th></tr></thead>
        <tbody id="studentTableBody">
          </tbody>
      </table>
    </div>
  </main>

  <script src="/js/firebase-config.js"></script>
  <script>
    // 날짜 세팅
    const today = new Date();
    document.getElementById('currentDate').innerHTML = `&lt; ${today.getFullYear()}년 ${String(today.getMonth() + 1).padStart(2, '0')}월 ${String(today.getDate()).padStart(2, '0')}일 &gt;`;

    // 1. 학생 리스트 실시간 감시 (기존과 동일)
    const tableBody = document.getElementById('studentTableBody');
    db.collection('active_students').onSnapshot((snapshot) => {
      tableBody.innerHTML = '';
      snapshot.forEach((doc) => {
        const student = doc.data();
        let statusClass = 'status-waiting';
        if (student.status === '집중') statusClass = 'status-focused';
        if (student.status === '졸음' || student.status === '자리이탈') statusClass = 'status-drowsy';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="status-dot ${statusClass}"></span>${student.status}</td>
          <td>${student.name}</td><td>${student.course}</td><td>${student.score}</td><td>${student.warnings}</td><td>O</td>
        `;
        tableBody.appendChild(tr);
      });
    });

    // 2. 🌟 기록 시작 버튼 상태 완벽 동기화 로직
    let isRecording = false;
    const recordBtn = document.getElementById('recordBtn');
    const statusRef = db.collection('settings').doc('class_status');

    // DB의 현재 상태를 읽어와서 버튼 UI를 세팅함 (새로고침해도 상태 유지!)
    statusRef.onSnapshot((doc) => {
      if (doc.exists) {
        isRecording = doc.data().is_class_started;
        if (isRecording) {
          recordBtn.textContent = '기록 종료';
          recordBtn.classList.add('recording');
        } else {
          recordBtn.textContent = '기록 시작';
          recordBtn.classList.remove('recording');
          recordBtn.style.backgroundColor = ''; 
          recordBtn.disabled = false;
        }
      }
    });

    // 버튼 클릭 시 DB만 바꿈 (UI는 위의 onSnapshot이 알아서 바꿔줌)
    recordBtn.addEventListener('click', async () => {
      if (!isRecording) {
        await statusRef.set({ is_class_started: true }, { merge: true });
        alert("수업 기록을 시작합니다.");
      } else {
        if(confirm("기록을 종료하시겠습니까?")) {
          await statusRef.set({ is_class_started: false }, { merge: true });
        }
      }
    });
    // 🌟 [추가] 저승사자 (하트비트 체크): 5초마다 순찰하며 끊긴 학생 강제 삭제
    setInterval(() => {
      db.collection('active_students').get().then((snapshot) => {
        const now = Date.now();
        snapshot.forEach((doc) => {
          const student = doc.data();
          // 마지막 생존 신고(lastActive)가 15초(15000ms) 이상 지났으면? -> "강제 종료한 학생"으로 간주!
          if (student.lastActive && (now - student.lastActive > 15000)) {
            console.log(`🚨 [순찰] ${student.name} 학생의 연결이 끊겼습니다. 명단에서 삭제합니다!`);
            db.collection('active_students').doc(doc.id).delete(); // DB에서 삭제 (표에서도 자동 삭제됨)
          }
        });
      });
    }, 5000);
  </script>
</body>
</html>
